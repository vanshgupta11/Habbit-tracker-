<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Heatmap</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── LeetCode exact palette ── */
    :root {
      --bg:           #000000;        /* pure black page bg */
      --surface:      #1a1a1a;        /* card / panel bg */
      --surface2:     #282828;        /* slightly lighter surface */
      --border:       #3a3a3a;        /* subtle border */
      --text:         #eff1f6;        /* primary text */
      --muted:        #6c6c6c;        /* secondary / dim text */
      --orange:       #ffa116;        /* LeetCode signature orange */
      --orange-dim:   #c47e0d;        /* darker orange hover */
      --green:        #00b8a3;        /* LeetCode easy green */
      --yellow:       #ffc01e;        /* LeetCode medium yellow */
      --blue:         #3b82f6;        /* LeetCode hard blue */
      --today:        #00c853;        /* today = bright green */
      --yesterday:    #117830;        /* yesterday = teal-green */
      --lit:          #dd891c;        /* lit = GitHub green */
      --day-bg:       #282828;        /* default in-range day */
      --day-oor:      #141414;        /* out-of-range day */
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 980px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 44px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Analog Clock ── */
    .clock-wrap {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #analog-clock {
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 0 0 4px var(--surface2), 0 0 24px rgba(0,200,83,0.15);
      display: block;
    }

    .clock-time-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.14em;
      font-family: 'DM Mono', monospace;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--orange);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      color: var(--text);
      line-height: 1.05;
    }

    h1 span { color: var(--orange); }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Month blocks ── */
    .months-wrapper {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .month-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px 26px 26px;
      position: relative;
    }

    .month-block::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--orange) 0%, transparent 70%);
      border-radius: 8px 8px 0 0;
    }

    .month-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .month-title .year-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface2);
    }

    /* ── Weekday header ── */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-bottom: 7px;
    }

    .wd {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      padding: 3px 0;
    }

    /* ── Days grid ── */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .day {
      aspect-ratio: 1;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      cursor: default;
      position: relative;
      transition: box-shadow 0.14s ease;
      user-select: none;
    }

    .day.empty { background: transparent; }

    .day.out-range {
      background: var(--day-oor);
      color: var(--muted);
      opacity: 0.4;
    }

    /* Default in-range day */
    .day.in-range {
      background: var(--day-bg);
      color: var(--muted);
      cursor: default;
    }

    /* Today */
    .day.is-today {
      background: var(--today);
      color: #000;
      font-weight: 700;
      cursor: pointer;
    }

    .day.is-today:hover { z-index: 10; }

    /* Yesterday */
    .day.is-yesterday {
      background: var(--yesterday);
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }

    .day.is-yesterday:hover { z-index: 10; }

    /* Dot under today/yesterday */
    .day.is-today::after,
    .day.is-yesterday::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
    }

    /* Lit state */
    .day.lit {
      background: var(--lit) !important;
      color: #000 !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      box-shadow: 0 0 7px rgba(206,228,114,0.6);
      animation: pulse-lit 1.6s ease-in-out infinite;
    }

    .day.lit:hover { z-index: 10; }

    /* ── Hover tooltip ── */
    .cell-tooltip {
      position: fixed;
      z-index: 200;
      background: #161616;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      max-width: 230px;
      min-width: 140px;
      font-family: 'DM Mono', monospace;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .cell-tooltip.visible { opacity: 1; }

    .cell-tooltip::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 8px 8px 0 0;
      background: linear-gradient(90deg, var(--lit), transparent 70%);
    }

    .tt-date {
      font-size: 10px;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 5px;
    }

    .tt-note {
      font-size: 11px;
      color: var(--text);
      line-height: 1.6;
      word-break: break-word;
    }

    .tt-hint {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* Note indicator pencil on lit cells that have a saved note */
    .day.lit.has-note::after {
      content: '✏';
      position: absolute;
      top: 1px;
      right: 2px;
      font-size: 8px;
      color: #000;
      opacity: 0.7;
      line-height: 1;
    }

    /* ── Notes Modal ── */
    .notes-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 110;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .notes-modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .notes-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 32px 24px;
      width: 90%;
      max-width: 460px;
      transform: translateY(18px) scale(0.97);
      transition: transform 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .notes-modal-overlay.active .notes-modal {
      transform: translateY(0) scale(1);
    }

    .notes-modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--lit), transparent 70%);
    }

    .notes-modal-date {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--lit);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .notes-modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }

    .notes-textarea {
      width: 100%;
      min-height: 130px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.14s ease;
    }

    .notes-textarea:focus {
      border-color: var(--lit);
    }

    .notes-textarea::placeholder {
      color: var(--muted);
    }

    .notes-char-count {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      margin-top: 5px;
      margin-bottom: 18px;
    }

    .notes-actions { display: flex; gap: 10px; }

    /* @keyframes pulse-lit {
      0%, 100% { box-shadow: 0 0 5px rgba(206,228,114,0.5); }
      50%       { box-shadow: 0 0 12px rgba(206,228,114,0.85); }
    } */

    /* ── Legend ── */
    .legend {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .legend-items {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .legend-text {
      font-size: 11px;
      color: var(--muted);
      margin-right: 14px;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px 36px;
      width: 90%;
      max-width: 400px;
      transform: translateY(18px) scale(0.97);
      transition: transform 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
    }

    .modal-icon { font-size: 32px; margin-bottom: 14px; }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .modal-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 26px;
    }

    .modal-body strong { color: var(--orange); }

    .modal-actions { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      padding: 11px 18px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.14s ease;
      letter-spacing: 0.04em;
    }

    .btn-yes {
      background: var(--orange);
      color: #000;
      font-weight: 700;
    }

    .btn-yes:hover {
      background: var(--yellow);
      transform: translateY(-1px);
      box-shadow: 0 5px 18px rgba(255,161,22,0.45);
    }

    .btn-no {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-no:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    /* ── Quote block ── */
    .quote-block {
      margin-bottom: 28px;
      padding: 18px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .quote-block::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--orange) 0%, transparent 70%);
      border-radius: 8px 8px 0 0;
    }

    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      line-height: 1;
      color: var(--orange);
      opacity: 0.25;
      position: absolute;
      top: 8px;
      left: 18px;
      user-select: none;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      font-style: italic;
      color: var(--text);
      line-height: 1.65;
      padding-left: 28px;
    }

    .quote-author {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--orange);
      margin-top: 10px;
      padding-left: 28px;
      letter-spacing: 0.1em;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .month-block { padding: 14px; }
      .day { font-size: 9px; border-radius: 4px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-text">
      <p class="label">// Activity Tracker //</p>
      <h1> <span>Discipline</span></h1>
      <p class="subtitle">11 March 2026 — 20 June 2026 &nbsp;·&nbsp; Click today or yesterday to light it up</p>
    </div>
    <div class="clock-wrap">
      <canvas id="analog-clock" width="130" height="130"></canvas>
      <span class="clock-time-label" id="clock-time-label">00:00:00</span>
    </div>
  </header>

  <div class="quote-block" id="quote-block">
    <div class="quote-mark">"</div>
    <div class="quote-text" id="quote-text"></div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <div class="months-wrapper" id="months-wrapper"></div>
  <div class="legend">
    <div class="legend-items">
      <div class="legend-dot" style="background:var(--today)"></div>
      <span class="legend-text">Today</span>
      <div class="legend-dot" style="background:var(--yesterday)"></div>
      <span class="legend-text">Yesterday</span>
      <div class="legend-dot" style="background:var(--lit)"></div>
      <span class="legend-text">Lit ✦</span>
    </div>
  </div>
</div>

<!-- Shared hover tooltip -->
<div class="cell-tooltip" id="cell-tooltip">
  <div class="tt-date" id="tt-date"></div>
  <div class="tt-note" id="tt-note"></div>
  <div class="tt-hint" id="tt-hint"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">🔆</div>
    <div class="modal-title" id="modal-title">Light up today?</div>
    <div class="modal-body" id="modal-body">
      Do you want to mark <strong id="modal-date-label"></strong> as active and light it up on the heatmap?
    </div>
    <div class="modal-actions">
      <button class="btn btn-yes" id="btn-yes">Yes, light it up</button>
      <button class="btn btn-no" id="btn-no">Not now</button>
    </div>
  </div>
</div>

<!-- Notes Modal -->
<div class="notes-modal-overlay" id="notes-modal-overlay">
  <div class="notes-modal">
    <div class="notes-modal-date" id="notes-modal-date"></div>
    <div class="notes-modal-title">Day Notes</div>
    <textarea class="notes-textarea" id="notes-textarea" placeholder="Write your note for this day…" maxlength="500"></textarea>
    <div class="notes-char-count"><span id="notes-char-count">0</span> / 500</div>
    <div class="notes-actions">
      <button class="btn btn-yes" id="notes-btn-save">Save note</button>
      <button class="btn btn-no" id="notes-btn-close">Close</button>
    </div>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────
  const RANGE_START = new Date(2026, 2, 11);   // 11 March 2026
  const RANGE_END   = new Date(2026, 5, 20);   // 20 June 2026

  const today     = new Date(2026, 2, 12);     // Today = 12 March 2026
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);

  // ── localStorage persistence ─────────────────────────────────
  const STORAGE_KEY = 'heatmap_lit_days';
  function loadLitDays() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? new Set(JSON.parse(saved)) : new Set();
    } catch { return new Set(); }
  }
  function saveLitDays() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...litDays])); } catch {}
  }
  const litDays = loadLitDays(); // Persisted across sessions

  // ── Notes persistence ────────────────────────────────────────
  const NOTES_KEY = 'heatmap_notes';
  function loadNotes() {
    try {
      const saved = localStorage.getItem(NOTES_KEY);
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  }
  function saveNote(key, text) {
    if (text.trim()) {
      notes[key] = text;
    } else {
      delete notes[key];
    }
    try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch {}
  }
  const notes = loadNotes();

  // ── Helpers ──────────────────────────────────────────────────
  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function sameDay(a, b) {
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  function inRange(d) {
    const t = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    return t >= RANGE_START && t <= RANGE_END;
  }

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // ── Build calendar ───────────────────────────────────────────
  // Determine months to render
  function getMonthsInRange() {
    const months = [];
    let y = RANGE_START.getFullYear(), m = RANGE_START.getMonth();
    const ey = RANGE_END.getFullYear(),  em = RANGE_END.getMonth();
    while (y < ey || (y === ey && m <= em)) {
      months.push({ year: y, month: m });
      m++;
      if (m > 11) { m = 0; y++; }
    }
    return months;
  }

  function buildMonth(year, month) {
    const block = document.createElement('div');
    block.className = 'month-block';

    // Title
    const title = document.createElement('div');
    title.className = 'month-title';
    title.innerHTML = `${MONTH_NAMES[month]} <span class="year-tag">${year}</span>`;
    block.appendChild(title);

    // Weekday headers
    const wdRow = document.createElement('div');
    wdRow.className = 'weekdays';
    DAY_NAMES.forEach(d => {
      const wd = document.createElement('div');
      wd.className = 'wd';
      wd.textContent = d;
      wdRow.appendChild(wd);
    });
    block.appendChild(wdRow);

    // Days grid
    const grid = document.createElement('div');
    grid.className = 'days-grid';

    const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const key  = dateKey(date);
      const cell = document.createElement('div');
      cell.className = 'day';
      cell.textContent = d;
      cell.dataset.key = key;
      cell.dataset.date = date.toDateString();

      if (!inRange(date)) {
        cell.classList.add('out-range');
      } else if (sameDay(date, today)) {
        if (litDays.has(key)) {
          cell.classList.add('in-range', 'lit');
          attachNoteHandler(cell, key);
        } else {
          cell.classList.add('in-range', 'is-today');
          cell.style.cursor = 'pointer';
          attachClickHandler(cell, date, 'today');
          attachTooltip(cell, 'Click to light it up');
        }
      } else if (sameDay(date, yesterday)) {
        if (litDays.has(key)) {
          cell.classList.add('in-range', 'lit');
          attachNoteHandler(cell, key);
        } else {
          cell.classList.add('in-range', 'is-yesterday');
          cell.style.cursor = 'pointer';
          attachClickHandler(cell, date, 'yesterday');
          attachTooltip(cell, 'Click to light it up');
        }
      } else if (litDays.has(key)) {
        cell.classList.add('in-range', 'lit');
        attachNoteHandler(cell, key);
      } else {
        cell.classList.add('in-range');
        cell.title = date.toDateString();
      }

      grid.appendChild(cell);
    }

    block.appendChild(grid);
    return block;
  }

  // ── Notes Modal logic ────────────────────────────────────────
  let activeNoteKey = null;

  function openNotesModal(key, dateStr) {
    activeNoteKey = key;
    document.getElementById('notes-modal-date').textContent = dateStr;
    const text = notes[key] || '';
    const ta = document.getElementById('notes-textarea');
    ta.value = text;
    document.getElementById('notes-char-count').textContent = text.length;
    document.getElementById('notes-modal-overlay').classList.add('active');
    ta.focus();
  }

  function closeNotesModal() {
    document.getElementById('notes-modal-overlay').classList.remove('active');
    activeNoteKey = null;
  }

  document.getElementById('notes-textarea').addEventListener('input', function() {
    document.getElementById('notes-char-count').textContent = this.value.length;
  });

  document.getElementById('notes-btn-save').addEventListener('click', () => {
    if (activeNoteKey) {
      const text = document.getElementById('notes-textarea').value;
      saveNote(activeNoteKey, text);
      // Update has-note indicator on the cell
      document.querySelectorAll(`.day.lit[data-key="${activeNoteKey}"]`).forEach(cell => {
        cell.classList.toggle('has-note', !!text.trim());
      });
    }
    closeNotesModal();
  });

  document.getElementById('notes-btn-close').addEventListener('click', closeNotesModal);

  document.getElementById('notes-modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('notes-modal-overlay')) closeNotesModal();
  });

  function attachNoteHandler(cell, key) {
    cell.addEventListener('click', () => {
      openNotesModal(key, cell.dataset.date);
    });
    if (notes[key]) cell.classList.add('has-note');
    attachTooltip(cell, undefined); // hint computed dynamically from note state
  }

  // ── Click / Modal logic ──────────────────────────────────────
  let pendingCell = null;
  let pendingKey  = null;

  function attachClickHandler(cell, date, type) {
    cell.addEventListener('click', () => {
      const key = dateKey(date);
      if (litDays.has(key)) return; // Already lit, do nothing

      pendingCell = cell;
      pendingKey  = key;

      const label = type === 'today' ? 'today' : 'yesterday';
      document.getElementById('modal-icon').textContent = type === 'today' ? '🔆' : '🌙';
      document.getElementById('modal-title').textContent = type === 'today' ? 'Light up today?' : 'Light up yesterday?';
      document.getElementById('modal-date-label').textContent = `${label} (${date.toDateString()})`;
      document.getElementById('modal-overlay').classList.add('active');
    });
  }

  document.getElementById('btn-yes').addEventListener('click', () => {
    if (pendingCell && pendingKey) {
      pendingCell.classList.remove('is-today','is-yesterday');
      pendingCell.classList.add('lit');
      litDays.add(pendingKey);
      saveLitDays(); // Persist to browser
      const cell = pendingCell;
      const key  = pendingKey;
      closeModal();
      attachNoteHandler(cell, key);
      openNotesModal(key, cell.dataset.date);
      return;
    }
    closeModal();
  });

  document.getElementById('btn-no').addEventListener('click', closeModal);

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  function closeModal() {

  // ── Render ───────────────────────────────────────────────────
  const wrapper = document.getElementById('months-wrapper');
  getMonthsInRange().forEach(({ year, month }) => {

  });
  // ── Tooltip ──────────────────────────────────────────────────
  const tooltip = document.getElementById('cell-tooltip');
  const ttDate  = document.getElementById('tt-date');
  const ttNote  = document.getElementById('tt-note');
  const ttHint  = document.getElementById('tt-hint');

  function showTooltip(cell, hintOverride) {
    const key      = cell.dataset.key;
    const dateStr  = cell.dataset.date || '';
    const noteText = key && notes[key] ? notes[key] : '';

    let hint = hintOverride;
    if (hint === undefined) {
      hint = noteText ? 'Click to edit note' : 'Click to add a note';
    }

    ttDate.textContent = dateStr;
    ttNote.textContent = noteText;
    ttNote.style.display = noteText ? 'block' : 'none';
    ttHint.textContent = hint;
    ttHint.style.display = hint ? 'block' : 'none';

    positionTooltip(cell);
    tooltip.classList.add('visible');
  }

  function positionTooltip(cell) {
    const rect = cell.getBoundingClientRect();
    const tw   = tooltip.offsetWidth  || 160;
    const th   = tooltip.offsetHeight || 60;
    let   left = rect.left + rect.width / 2 - tw / 2;
    let   top  = rect.top  - th - 10;

    // Keep inside viewport
    left = Math.max(8, Math.min(left, window.innerWidth  - tw - 8));
    top  = top < 8 ? rect.bottom + 10 : top;

    tooltip.style.left = left + 'px';
    tooltip.style.top  = top  + 'px';
  }

  function hideTooltip() {
    tooltip.classList.remove('visible');
  }

  function attachTooltip(cell, hint) {
    cell.addEventListener('mouseenter', () => showTooltip(cell, hint));
    cell.addEventListener('mouseleave', hideTooltip);
  }

  // ── Analog Clock ─────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('analog-clock');
    const ctx    = canvas.getContext('2d');
    const SIZE   = canvas.width;
    const CX     = SIZE / 2;
    const CY     = SIZE / 2;
    const R      = SIZE / 2 - 6;

    function drawClock() {
      const now = new Date();
      const h   = now.getHours() % 12;
      const m   = now.getMinutes();
      const s   = now.getSeconds();
      const ms  = now.getMilliseconds();

      ctx.clearRect(0, 0, SIZE, SIZE);

      // Face
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.fillStyle = '#111111';
      ctx.fill();

      // Tick marks
      for (let i = 0; i < 60; i++) {
        const angle  = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const isHour = i % 5 === 0;
        const inner  = isHour ? R - 11 : R - 6;
        ctx.beginPath();
        ctx.moveTo(CX + Math.cos(angle) * inner, CY + Math.sin(angle) * inner);
        ctx.lineTo(CX + Math.cos(angle) * (R - 1), CY + Math.sin(angle) * (R - 1));
        ctx.strokeStyle = isHour ? '#ffa116' : '#3a3a3a';
        ctx.lineWidth   = isHour ? 2 : 1;
        ctx.stroke();
      }

      // Hour numbers (3, 6, 9, 12)
      ctx.font = 'bold 9px DM Mono, monospace';
      ctx.fillStyle  = '#6c6c6c';
      ctx.textAlign  = 'center';
      ctx.textBaseline = 'middle';
      [[12,0],[ 3,90],[6,180],[9,270]].forEach(([n, deg]) => {
        const a = (deg - 90) * Math.PI / 180;
        ctx.fillText(n, CX + Math.cos(a) * (R - 18), CY + Math.sin(a) * (R - 18));
      });

      // Hour hand
      const hAngle = ((h + m / 60 + s / 3600) / 12) * Math.PI * 2 - Math.PI / 2;
      drawHand(hAngle, R * 0.52, 3.5, '#eff1f6');

      // Minute hand
      const mAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
      drawHand(mAngle, R * 0.73, 2.5, '#eff1f6');

      // Second hand (smooth)
      const sAngle = ((s + ms / 1000) / 60) * Math.PI * 2 - Math.PI / 2;
      drawHand(sAngle, R * 0.82, 1, '#00c853');

      // Center dot
      ctx.beginPath();
      ctx.arc(CX, CY, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = '#00c853';
      ctx.fill();

      // Digital label
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock-time-label').textContent =
        `${pad(now.getHours())}:${pad(m)}:${pad(s)}`;
    }

    function drawHand(angle, length, width, color) {
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(CX + Math.cos(angle) * length, CY + Math.sin(angle) * length);
      ctx.strokeStyle = color;
      ctx.lineWidth   = width;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }

    drawClock();
    setInterval(drawClock, 1000 / 30); // ~30fps for smooth second hand
  })();
